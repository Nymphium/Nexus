name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: cargo fmt
        run: cargo fmt -- --check
      - name: nix fmt
        run: nix fmt -- --ci

  tree-sitter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: tree-sitter test
        run: cd tree-sitter-nexus && tree-sitter test
      - name: tree-sitter generate (check up to date)
        run: |
          cd tree-sitter-nexus && tree-sitter generate
          git diff --exit-code tree-sitter-nexus

  test-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: core tests
        run: cargo test --release --test integration suite::core -- --quiet

  test-stdlib-runtime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: stdlib & runtime tests
        run: cargo test --release --test integration suite::stdlib_runtime -- --quiet
